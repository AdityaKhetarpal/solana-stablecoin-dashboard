<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#12121e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="1050" cy="120" r="180" fill="#9945FF" opacity="0.06" filter="url(#softglow)"/>
  <!-- Glow orb bottom-left -->
  <circle cx="150" cy="510" r="160" fill="#14F195" opacity="0.06" filter="url(#softglow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Solana logo mark - simplified diamond -->
  <g transform="translate(80, 72)">
    <rect x="0" y="0" width="36" height="6" rx="3" fill="url(#accent)"/>
    <rect x="6" y="12" width="36" height="6" rx="3" fill="url(#accent)" opacity="0.8"/>
    <rect x="0" y="24" width="36" height="6" rx="3" fill="url(#accent)" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">Solana Stablecoin</text>
  <text x="80" y="255" font-family="'Arial', 'Helvetica', sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">Analytics</text>

  <!-- Gradient underline -->
  <rect x="80" y="272" width="380" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="328" font-family="'Arial', 'Helvetica', sans-serif" font-size="24" fill="#8888aa" font-weight="400">Tracking Solana's $16B+ stablecoin ecosystem</text>

  <!-- Stat cards -->
  <!-- Card 1 -->
  <rect x="80" y="370" width="220" height="110" rx="12" fill="url(#card1)" stroke="#2a2a40" stroke-width="1"/>
  <text x="104" y="402" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#666688" font-weight="600" letter-spacing="1.5">TOTAL SUPPLY</text>
  <text x="104" y="440" font-family="'Arial', 'Helvetica', sans-serif" font-size="30" font-weight="700" fill="#14F195">$16B+</text>
  <text x="104" y="462" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#555577">on-chain circulating</text>

  <!-- Card 2 -->
  <rect x="320" y="370" width="220" height="110" rx="12" fill="url(#card1)" stroke="#2a2a40" stroke-width="1"/>
  <text x="344" y="402" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#666688" font-weight="600" letter-spacing="1.5">TOP ASSET</text>
  <text x="344" y="440" font-family="'Arial', 'Helvetica', sans-serif" font-size="30" font-weight="700" fill="#9945FF">USDC</text>
  <text x="344" y="462" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#555577">#1 stablecoin on Solana</text>

  <!-- Card 3 -->
  <rect x="560" y="370" width="220" height="110" rx="12" fill="url(#card1)" stroke="#2a2a40" stroke-width="1"/>
  <text x="584" y="402" font-family="'Arial', 'Helvetica', sans-serif" font-size="11" fill="#666688" font-weight="600" letter-spacing="1.5">DATA SOURCE</text>
  <text x="584" y="440" font-family="'Arial', 'Helvetica', sans-serif" font-size="30" font-weight="700" fill="#ffffff">DeFiLlama</text>
  <text x="584" y="462" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#555577">live &amp; historical data</text>

  <!-- Right side chart illustration -->
  <g opacity="0.9">
    <!-- Chart area background -->
    <rect x="850" y="130" width="290" height="160" rx="8" fill="#111118" stroke="#1e1e30" stroke-width="1"/>

    <!-- Chart sparkline - supply trend going up -->
    <polyline points="870,270 895,262 920,258 945,252 970,248 995,240 1020,232 1045,220 1070,215 1095,204 1120,195" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Fill under line -->
    <polygon points="870,280 870,270 895,262 920,258 945,252 970,248 995,240 1020,232 1045,220 1070,215 1095,204 1120,195 1120,280" fill="url(#accent)" opacity="0.08"/>

    <!-- Chart label -->
    <text x="870" y="156" font-family="'Arial', 'Helvetica', sans-serif" font-size="10" fill="#555577" font-weight="600" letter-spacing="1">SUPPLY TREND</text>
    <text x="870" y="178" font-family="'Arial', 'Helvetica', sans-serif" font-size="20" font-weight="700" fill="#14F195">↑ ATH</text>

    <!-- Dot at end -->
    <circle cx="1120" cy="195" r="4" fill="#14F195" filter="url(#glow)"/>
  </g>

  <!-- Feature tags -->
  <g>
    <rect x="850" y="340" width="100" height="28" rx="14" fill="#14F19515" stroke="#14F19530" stroke-width="1"/>
    <text x="900" y="358" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#14F195" text-anchor="middle" font-weight="600">Live Data</text>

    <rect x="962" y="340" width="120" height="28" rx="14" fill="#9945FF15" stroke="#9945FF30" stroke-width="1"/>
    <text x="1022" y="358" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#9945FF" text-anchor="middle" font-weight="600">Free &amp; Open</text>

    <rect x="850" y="380" width="110" height="28" rx="14" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
    <text x="905" y="398" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#aaaacc" text-anchor="middle" font-weight="600">Q1 Reports</text>

    <rect x="972" y="380" width="108" height="28" rx="14" fill="#ffffff08" stroke="#ffffff15" stroke-width="1"/>
    <text x="1026" y="398" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="#aaaacc" text-anchor="middle" font-weight="600">Peg Tracker</text>
  </g>

  <!-- Bottom URL bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d0d18"/>
  <text x="80" y="616" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="#444466">solanastablecoin.bingo</text>
  <text x="1120" y="616" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="#444466" text-anchor="end">powered by DefiLlama</text>
</svg>
